{% set name = "ChessAnalysisPipeline" %}
{% set version = "2026.4.28" %}
{% set python_min = "3.10" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://files.pythonhosted.org/packages/9e/3d/64c8883844337c5b5d6db5a802a9797d6f124bbfe89849ab3f16615272a0/chessanalysispipeline-{{ version }}.tar.gz
  sha256: a391ef2b6d72679069ee608e94117809f5b48a19601fff981da38f86239987ff

build:
  entry_points:
    - CHAP = CHAP.runner:main
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - numpy
    - pydantic
    - pyyaml

test:
  imports:
    - CHAP
  commands:
    - pip check
    - CHAP --help
  requires:
    - python {{ python_min }}
    - pip
    - numpy
    - pydantic
    - pyyaml

about:
  home: https://github.com/CHESSComputing/ChessAnalysisPipeline
  summary: CHESS analysis pipeline framework
  license: MIT
  license_file: LICENSE
  dev_url: https://github.com/CHESSComputing/ChessAnalysisPipeline

extra:
  recipe-maintainers:
    - keara-soloway
    - rolfverberg
